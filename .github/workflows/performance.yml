name: Performance Tests

on:
  # Manual trigger — choose branch + optional BASE_URL override
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL for k6 tests (leave empty to start local server)'
        required: false
        default: ''
  # Scheduled — runs weekly on Monday 6:00 UTC against default branch
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  performance:
    name: k6 Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: perf_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # These are ephemeral CI-only credentials for the throwaway test DB above.
      # Not a real secret — the container is destroyed after the job finishes.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/perf_test_db?schema=public
      DATABASE_URL_REPLICA: postgresql://postgres:postgres@localhost:5432/perf_test_db?schema=public
      NODE_ENV: test
      PORT: 3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Build and start server
        run: |
          npm run build
          node dist/main.js &
          SERVER_PID=$!
          echo "Waiting for server at http://localhost:3000 (PID ${SERVER_PID})..."
          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:3000/health" > /dev/null 2>&1; then
              echo "Server is ready (attempt $i)"
              SERVER_READY=true
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          if [ "$SERVER_READY" != "true" ]; then
            echo "ERROR: Server did not become ready after 60 seconds."
            echo "--- Last 50 lines of server output ---"
            # The background process might have exited; check if it's alive
            kill -0 $SERVER_PID 2>/dev/null && echo "Server process is still running" || echo "Server process has EXITED"
            exit 1
          fi

      - name: Run k6 performance tests
        env:
          CI: 'true'
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:3000' }}
        run: BASE_URL=$BASE_URL bash test/performance/run-all.sh

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: test/performance/
          retention-days: 14
